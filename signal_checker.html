<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rebel Alliance Signal Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #FFD700;
      --gold-dim: #b8960c;
      --dark: #050a14;
      --mid: #0d1b2e;
      --light-text: #c9d6e8;
      --red: #c0392b;
      --red-bright: #ff4136;
    }

    body {
      background-color: var(--dark);
      color: var(--light-text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      position: relative;
      padding: 1.5rem 1rem;
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .stars::before, .stars::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  50%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 70%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 45%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 65% 30%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 5%,  rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 2%  30%, rgba(255,255,255,0.7) 0%, transparent 100%);
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    .stars::after {
      background-image:
        radial-gradient(1px 1px at 12% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 33% 22%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 58% 88%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 77% 42%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 48% 62%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 8%,  rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 68% 48%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 72%, rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 8%  92%, rgba(255,255,255,0.5) 0%, transparent 100%);
      animation-delay: 3s;
    }
    @keyframes twinkle {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(520px, 94vw);
      text-align: center;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      letter-spacing: 0.12em;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 0 60px rgba(255,215,0,0.2);
      margin-bottom: 0.25em;
      animation: glow-pulse 3s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 0 60px rgba(255,215,0,0.2); }
      50%       { text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 80px rgba(255,215,0,0.4); }
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.8vw, 0.78rem);
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider::after { background: linear-gradient(to left, transparent, var(--gold)); }
    .divider-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

    .card {
      background: linear-gradient(135deg, rgba(13,27,46,0.95) 0%, rgba(5,10,20,0.98) 100%);
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 4px;
      padding: 1.75rem 1.75rem;
      box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,215,0,0.1);
    }

    .instruction {
      font-size: 0.82rem;
      color: rgba(201,214,232,0.7);
      line-height: 1.6;
      margin-bottom: 1.25rem;
      letter-spacing: 0.03em;
    }

    /* Three inputs in a row */
    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.1rem;
    }

    .input-group {
      flex: 1;
      text-align: left;
    }

    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 2px;
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-size: 1.2rem;
      font-weight: 300;
      text-align: center;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      letter-spacing: 0.1em;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      border-color: rgba(255,215,0,0.6);
      box-shadow: 0 0 20px rgba(255,215,0,0.1);
    }
    input[type="number"]::placeholder { color: rgba(255,255,255,0.2); }

    button {
      margin-top: 1.25rem;
      width: 100%;
      background: linear-gradient(135deg, #c9a800 0%, #ffd700 50%, #c9a800 100%);
      border: none;
      border-radius: 2px;
      color: #050a14;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,215,0,0.25);
    }
    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 30px rgba(255,215,0,0.4);
    }
    button:active { transform: translateY(0); }

    .result {
      margin-top: 1.5rem;
      min-height: 4.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.78rem, 2.5vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.6;
      text-align: center;
    }
    .result.visible { opacity: 1; transform: translateY(0); }
    .result.success {
      background: rgba(255,215,0,0.08);
      border: 1px solid rgba(255,215,0,0.3);
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    .result.failure {
      background: rgba(192,57,43,0.08);
      border: 1px solid rgba(192,57,43,0.3);
      color: #e74c3c;
      text-shadow: 0 0 20px rgba(192,57,43,0.4);
    }
    .result-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }

    .footer-text {
      margin-top: 1.75rem;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.15);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="stars"></div>

<div class="container">
  <div class="logo">Rebel Alliance<br>Signal Checker</div>
  <div class="subtitle">Decode the signal &mdash; Save the Galaxy</div>

  <div class="divider"><div class="divider-diamond"></div></div>

  <div class="card">
    <p class="instruction">
      Enter the 25th, 50th, and 75th percentiles of<br>
      <em>p</em>(signal<sub>T</sub> | message<sub>1</sub>, &hellip;, message<sub>T</sub>)<br>
      computed from your Kalman filter.
    </p>

    <div class="input-row">
      <div class="input-group">
        <label for="p25">25th Pctile</label>
        <input type="number" id="p25" placeholder="0.00" step="any"/>
      </div>
      <div class="input-group">
        <label for="p50">50th Pctile</label>
        <input type="number" id="p50" placeholder="0.00" step="any"/>
      </div>
      <div class="input-group">
        <label for="p75">75th Pctile</label>
        <input type="number" id="p75" placeholder="0.00" step="any"/>
      </div>
    </div>

    <button onclick="checkSignal()">Transmit to Rebel Alliance</button>

    <div class="result" id="result"></div>
  </div>

  <div class="footer-text">jeremypiger.com &mdash; EC 607</div>
</div>

<script>
  // -------------------------------------------------------
  // PARAMETERS — easy to update
  // -------------------------------------------------------
  const CORRECT = {
    p25: -2.72,   // correct 25th percentile
    p50:  -2.15,   // correct 50th percentile (median)
    p75:  -1.57    // correct 75th percentile
  };
  const TOLERANCE = 0.04;  // 1% tolerance: answer must be within ±(TOLERANCE * |correct|)
  // -------------------------------------------------------

  const SUCCESS_MESSAGE = "The Force is Strong with You!<br>Meet the Rebel Fleet at the secret Rebel base on Yavin 4.";

  const FAILURE_MESSAGES = [
    "Wow, did you have Jar Jar Binks construct that estimate?",
    "Nice try, Darth Vader. Better luck next time.",
    "Do or do not. There is no try. You did not.",
    "Fear is the path to the dark side. Inaccurate Kalman Filter calculations can also get you there."
  ];

  function withinTolerance(entered, correct) {
    const tol = Math.abs(correct) * TOLERANCE;
    return Math.abs(entered - correct) <= tol;
  }

  function randomFailure() {
    return FAILURE_MESSAGES[Math.floor(Math.random() * FAILURE_MESSAGES.length)];
  }

  function checkSignal() {
    const result = document.getElementById('result');
    const inputs = {
      p25: document.getElementById('p25').value.trim(),
      p50: document.getElementById('p50').value.trim(),
      p75: document.getElementById('p75').value.trim()
    };

    // Validate all fields filled
    if (inputs.p25 === '' || inputs.p50 === '' || inputs.p75 === '') {
      result.className = 'result visible failure';
      result.innerHTML = '<span class="result-icon">⚠️</span>Please enter all three percentiles.';
      return;
    }

    const vals = {
      p25: parseFloat(inputs.p25),
      p50: parseFloat(inputs.p50),
      p75: parseFloat(inputs.p75)
    };

    if (isNaN(vals.p25) || isNaN(vals.p50) || isNaN(vals.p75)) {
      result.className = 'result visible failure';
      result.innerHTML = '<span class="result-icon">⚠️</span>Please enter valid numbers.';
      return;
    }

    // Reset for re-animation
    result.className = 'result';
    result.innerHTML = '';
    void result.offsetWidth;

    const allCorrect =
      withinTolerance(vals.p25, CORRECT.p25) &&
      withinTolerance(vals.p50, CORRECT.p50) &&
      withinTolerance(vals.p75, CORRECT.p75);

    if (allCorrect) {
      result.className = 'result visible success';
      result.innerHTML = '<span class="result-icon">✨</span>' + SUCCESS_MESSAGE;
    } else {
      result.className = 'result visible failure';
      result.innerHTML = randomFailure();
    }
  }

  // Allow Enter key from any input
  document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('keydown', e => { if (e.key === 'Enter') checkSignal(); });
  });
</script>

</body>
</html>
